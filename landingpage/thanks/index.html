<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="theme-color" content="#F2F0ED">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self'; connect-src 'self' https:; font-src 'self' data:; base-uri 'self'; form-action 'self' https:; frame-ancestors 'none'; object-src 'none'"

    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/assets/site.webmanifest">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="/assets/config.js" defer></script>
    <script src="/assets/site.js" defer></script>

  <body class="page page-center">
    <div class="canvas-shell">
      <header class="site-header fade-up stagger-1">
        <a class="brand" href="/" aria-label="CursorBuddy home">
          <img src="/assets/brand-mark.svg" alt="" width="28" height="28">

        <nav class="site-nav" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
        </nav>
      </header>

      <main class="page-main">
        <section class="section center-panel">
          <article class="glass-panel centered-card fade-up stagger-2">
            <p class="section-label">Waitlist Confirmed</p>
            <h1 class="headline headline--compact">You are on the list.</h1>
            <p class="subhead subhead--compact">

            </p>
            <div class="hero__actions">
              <a class="button button--primary" href="/">Back to home</a>
              <a class="button button--ghost" href="/privacy/">Read privacy details</a>
            </div>
          </article>
        </section>
      </main>

      <footer class="site-footer">
        <p>© <span data-year></span> CursorBuddy</p>
        <div class="site-footer__links">
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
          <a href="mailto:hello@cursorbuddy.dev">Contact</a>
