version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  openclaw:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -lc "npm install && npm run build --workspace=packages/openclaw && node packages/openclaw/dist/index.js"
    ports:
      - "9090:9090"
    environment:
      OPENCLAW_LISTEN_PORT: "9090"
      OPENCLAW_SERVICE_TOKEN: "change-me-openclaw-service-token"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_REALTIME_MODEL: "gpt-realtime"
